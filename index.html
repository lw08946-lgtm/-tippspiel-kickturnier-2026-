<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tippspiel Kickturnier 2026</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1>⚽ Tippspiel Kickturnier 2026</h1>

    <div class="spielerbox">

        <span id="spieler">Nicht angemeldet</span>

        <span id="coins">💰 1000 Coins</span>

    </div>

</header>

<nav>

<button onclick="zeigeStart()">🏠 Start</button>

<button onclick="zeigeSpiele()">⚽ Spiele</button>

<button onclick="zeigeWettschein()">🎟️ Wettschein</button>

<button onclick="zeigeMeineWetten()">📋 Meine Wetten</button>

<button onclick="zeigeAdmin()">⚙️ Admin</button>

</nav>

<main>

<section class="karte" id="startSeite">

<h2>Anmelden</h2>

<input
id="name"
type="text"
placeholder="Dein Name">

<button id="loginButton">
Anmelden
</button>

</section>

<section class="karte" id="spieleSeite">

<h2>Spiele</h2>

<div id="spieleListe"></div>

</section>

<section class="karte" id="wettscheinSeite">

<h2>🎟️ Wettschein</h2>

<div id="wettscheinListe">
    <p>Noch keine Wetten ausgewählt.</p>
</div>

<p>Gesamtquote: <strong id="gesamtQuote">1.00</strong></p>
<p>Möglicher Gewinn: <strong id="moeglicherGewinn">0.00 Coins</strong></p>
<input
    id="einsatz"
    type="number"
    placeholder="Einsatz"
    oninput="berechneGewinn()">

<button>Wette platzieren</button>

</section>
<section class="karte" id="adminSeite" style="display:none;">

<h2>⚙️ Adminbereich</h2>

<p>Hier kannst du später das komplette Turnier verwalten.</p>
<h3>Teams</h3>

<h3>Gruppe A</h3>

<input id="team1" placeholder="Team A1"><br><br>
<input id="team2" placeholder="Team A2"><br><br>
<input id="team3" placeholder="Team A3"><br><br>
<input id="team4" placeholder="Team A4"><br><br>

<h3>Gruppe B</h3>

<input id="team5" placeholder="Team B1"><br><br>
<input id="team6" placeholder="Team B2"><br><br>
<input id="team7" placeholder="Team B3"><br><br>
<input id="team8" placeholder="Team B4"><br><br>

<h3>Gruppe C</h3>

<input id="team9" placeholder="Team C1"><br><br>
<input id="team10" placeholder="Team C2"><br><br>
<input id="team11" placeholder="Team C3"><br><br>
<input id="team12" placeholder="Team C4"><br><br>

<button onclick="teamsSpeichern()">
💾 Teams speichern
</button>

<hr>
<button id="teamsButton">
👥 Teams bearbeiten
</button>

<br><br>

<button id="quotenButton">
📈 Quoten bearbeiten
</button>

<br><br>

<button id="ergebnisButton">
⚽ Ergebnisse eintragen
</button>

<br><br>

<button id="resetButton">
🔄 Turnier zurücksetzen
</button>

</section>
</main>

<script src="script.js"></script>

</body>

</html>
