<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tippspiel Kickturnier 2026</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1>⚽ Tippspiel Kickturnier 2026</h1>

    <div class="spielerbox">

        <span id="spieler">Nicht angemeldet</span>

        <span id="coins">💰 1000 Coins</span>

    </div>

</header>

<nav>

    <button>🏠 Start</button>
    <button>⚽ Spiele</button>
    <button>🎟️ Wettschein</button>
    <button>⚙️ Admin</button>

</nav>

<main>

<section class="karte">

<h2>Anmelden</h2>

<input
id="name"
type="text"
placeholder="Dein Name">

<button id="loginButton">
Anmelden
</button>

</section>

<section class="karte">

<h2>Spiele</h2>

<div class="spiel">

<div>

<strong>Team 1</strong>

</div>

<div class="quoten">

<button>2.10</button>

<button>3.50</button>

<button>2.80</button>

</div>

<div>

<strong>Team 2</strong>

</div>

</div>

</section>

<section class="karte">

<h2>🎟️ Wettschein</h2>

<p>Noch keine Wetten ausgewählt.</p>

<p>Quote: <strong>0.00</strong></p>

<input
type="number"
placeholder="Einsatz">

<button>Wette platzieren</button>

</section>

</main>

<script src="script.js"></script>

</body>

</html>
