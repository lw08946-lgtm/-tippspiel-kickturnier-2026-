<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tippspiel Kickturnier 2026</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#121212;
            color:white;
        }

        header{
            background:#1c1c1c;
            padding:20px;
            text-align:center;
            border-bottom:3px solid #00c853;
        }

        h1{
            color:#00e676;
        }

        .container{
            width:95%;
            max-width:1000px;
            margin:auto;
            padding:20px;
        }

        .card{
            background:#242424;
            padding:20px;
            border-radius:12px;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:15px;
            background:#00c853;
            border:none;
            border-radius:10px;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#00a846;
        }

        input{
            width:100%;
            padding:15px;
            margin-top:10px;
            border:none;
            border-radius:10px;
            background:#333;
            color:white;
        }
    </style>

</head>

<body>

<header>

<h1>⚽ Tippspiel Kickturnier 2026</h1>

</header>

<div class="container">

<div class="card">

<h2>Login</h2>

<input placeholder="Name">

<input placeholder="Zugangscode">

<br><br>

<button>Anmelden</button>

</div>

<div class="card">

<h2>Nächstes Spiel</h2>

<p>Team 1 vs Team 2</p>

<p>12:00 Uhr</p>

</div>

<div class="card">

<h2>Rangliste</h2>

<p>🥇 Noch keine Teilnehmer</p>

</div>

</div>

</body>
</html>
