<!DOCTYPE html>
<html lang="de">
<head>

<body>

<header>
    <nav>

<button>🏠 Start</button>

<button>⚽ Spiele</button>

<button>⚙️ Admin</button>

</nav>

<h1>⚽ Tippspiel Kickturnier 2026</h1>

</header>

<div class="container">

<div class="card">

<h2>Login</h2>

<input id="name" placeholder="Name">

<input id="code" placeholder="Zugangscode">

<br><br>

<button onclick="login()">Anmelden</button>

</div>

<div class="card">

<h2>Heutige Spiele</h2>

</div>

<hr>

<div class="spiel">

<h3>Team 3 🆚 Team 4</h3>

<p>10:20 Uhr</p>

<button>Jetzt tippen</button>

</div>

</div>

<div class="card">

<h2>Rangliste</h2>

<p>🥇 Noch keine Teilnehmer</p>

</div>

</div>
<script src="script.js"></script>
